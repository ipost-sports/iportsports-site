<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">iPost Sports</title>
<meta name="description" id="page-description" content="Live stream and admin tools, powered by iPost Sports.">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="container nav-row">
    <a href="/" class="logo" aria-label="iPost Sports home">
      <img src="https://i.imgur.com/C36slk6.png" alt="iPost Sports" class="logo-img">
    </a>
    <nav class="primary-nav" aria-label="Primary">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/facilities/">Smart Sports Facility</a></li>
        <li><a href="/promo/">Team Streaming</a></li>
        <li><a href="/gametap/">Visitor Access</a></li>
        <li><a href="/coachesadmin/">Coaches' Admin</a></li>
        <li><a href="/highlight-gallery/">Highlight Gallery</a></li>
      </ul>
    </nav>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="https://www.ipostsports.net/login" target="_blank" rel="noopener">Log In</a>
      <a class="btn btn-solid" href="https://www.ipostsports.net/signup" target="_blank" rel="noopener">Sign Up</a>
      <button class="menu-toggle" aria-label="Open menu">&#9776;</button>
    </div>
  </div>
</header>

<main>

  <section class="facility-hero">
    <div class="container">
      <span class="live-dot"><span class="pulse"></span> Live</span>
      <h1 id="facility-title">Facility</h1>
    </div>
  </section>

  <section id="facility-body" class="section-alt">
    <div class="container" id="facility-sections"></div>
  </section>

  <section id="facility-not-found" hidden>
    <div class="container">
      <h1>Page not found</h1>
      <p class="lede">We couldn't find that facility page. <a href="/">Return home</a>.</p>
    </div>
  </section>

</main>

<footer>
  <div class="container">
    <div class="footer-grid">
      <a href="/" class="logo" aria-label="iPost Sports home">
        <img src="https://i.imgur.com/C36slk6.png" alt="iPost Sports" class="logo-img">
      </a>
      <div class="footer-contact">
        <div class="row">
          <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M502.3 190.8c3.9-3.1 9.7-.2 9.7 4.7V400c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V195.6c0-5 5.7-7.8 9.7-4.7 22.4 17.4 52.1 39.5 154.1 113.6 21.1 15.4 56.7 47.8 92.2 47.6 35.7.3 72-32.8 92.3-47.6 102-74.1 131.6-96.3 154-113.7zM256 320c23.2.4 56.6-29.2 73.4-41.4 132.7-96.3 142.8-104.7 173.4-128.7 5.8-4.5 9.2-11.5 9.2-18.9v-19c0-26.5-21.5-48-48-48H48C21.5 64 0 85.5 0 112v19c0 7.4 3.4 14.3 9.2 18.9 30.6 23.9 40.7 32.4 173.4 128.7 16.8 12.2 50.2 41.8 73.4 41.4z"/></svg>
          info@ipostsports.com
        </div>
        <div class="row">
          <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M497.39 361.8l-112-48a24 24 0 0 0-28 6.9l-49.6 60.6A370.66 370.66 0 0 1 130.6 204.11l60.6-49.6a23.94 23.94 0 0 0 6.9-28l-48-112A24.16 24.16 0 0 0 122.6.61l-104 24A24 24 0 0 0 0 48c0 256.5 207.9 464 464 464a24 24 0 0 0 23.4-18.6l24-104a24.29 24.29 0 0 0-14.01-27.6z"/></svg>
          562-573-3500
        </div>
      </div>
    </div>
    <p class="copyright">© 2026 iPost Sports. All rights reserved.</p>
  </div>
</footer>

<script src="/facility-data.js"></script>
<script>
(function () {
  var slug = location.pathname.replace(/^\/|\/$/g, '');
  var data = window.FACILITY_DATA && window.FACILITY_DATA[slug];

  if (!data) {
    document.getElementById('facility-not-found').hidden = false;
    document.querySelector('.facility-hero').hidden = true;
    document.getElementById('facility-body').hidden = true;
    return;
  }

  document.getElementById('page-title').textContent = data.title + ' — iPost Sports';
  document.getElementById('page-description').setAttribute(
    'content',
    'Live stream and admin tools for ' + data.title + ', powered by iPost Sports.'
  );
  document.getElementById('facility-title').textContent = data.title;

  var sectionsEl = document.getElementById('facility-sections');

  data.sections.forEach(function (section) {
    var wrap = document.createElement('div');
    wrap.className = 'embed-section';

    if (section.heading) {
      var h2 = document.createElement('h2');
      h2.textContent = section.heading;
      wrap.appendChild(h2);
    }

    (section.paragraphs || []).forEach(function (text) {
      var p = document.createElement('p');
      p.textContent = text;
      wrap.appendChild(p);
    });

    var frame = document.createElement('div');
    frame.className = 'embed-frame viewfinder';
    frame.innerHTML = '<span class="vf-tr"></span><span class="vf-br"></span>';

    var iframe = document.createElement('iframe');
    iframe.src = section.src;
    iframe.name = 'myiFrame';
    iframe.scrolling = section.scrolling || 'yes';
    iframe.height = section.height || '600';
    iframe.allowFullscreen = true;
    iframe.loading = 'lazy';
    frame.appendChild(iframe);

    wrap.appendChild(frame);
    sectionsEl.appendChild(wrap);
  });
})();
</script>

</body>
</html>
